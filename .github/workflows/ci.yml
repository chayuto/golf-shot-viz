name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npm run typecheck

      - run: npm test

      - run: npm run build

      - run: npm run demo:build

  # Renders the demo headlessly and uploads the README media and the
  # options catalog so visual regressions are reviewable on every PR.
  visuals:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - run: npx playwright install --with-deps chromium

      - run: npm run visuals

      - run: npm run catalog

      - uses: actions/upload-artifact@v4
        with:
          name: readme-media
          path: docs/media

      - uses: actions/upload-artifact@v4
        with:
          name: options-catalog
          path: demo/public/catalog
